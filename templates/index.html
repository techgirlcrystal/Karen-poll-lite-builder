<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NIL Deals Poll</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #e0e0e0;
    }

    .card {
      background: linear-gradient(145deg, #141420, #1a1a2e);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 480px;
      width: 90%;
      box-shadow:
        0 20px 60px rgba(0, 0, 0, 0.6),
        0 0 80px rgba(100, 60, 255, 0.05);
      text-align: center;
    }

    .badge {
      display: inline-block;
      background: rgba(255, 200, 60, 0.12);
      color: #ffc83c;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 20px;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 36px;
      color: #ffffff;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .vote-btn {
      padding: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.03);
      color: #e0e0e0;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .vote-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.15);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
    }

    .vote-btn.yes:hover { border-color: #4caf50; color: #4caf50; }
    .vote-btn.no:hover { border-color: #ef5350; color: #ef5350; }
    .vote-btn.not-sure:hover { border-color: #ffc83c; color: #ffc83c; }

    .results {
      display: none;
      flex-direction: column;
      gap: 20px;
      margin-top: 8px;
    }

    .results.show {
      display: flex;
    }

    .result-row {
      text-align: left;
    }

    .result-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
    }

    .result-bar-bg {
      height: 10px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 6px;
      overflow: hidden;
    }

    .result-bar {
      height: 100%;
      border-radius: 6px;
      width: 0%;
      transition: width 0.8s ease;
    }

    .result-bar.yes { background: linear-gradient(90deg, #4caf50, #66bb6a); }
    .result-bar.no { background: linear-gradient(90deg, #ef5350, #e57373); }
    .result-bar.not-sure { background: linear-gradient(90deg, #ffc83c, #ffd54f); }

    .total-votes {
      font-size: 13px;
      color: #888;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">Live Poll</div>
    <h1>Should high school athletes be allowed to sign NIL deals?</h1>

    <div class="buttons" id="buttons">
      <button class="vote-btn yes" onclick="vote('yes')">Yes</button>
      <button class="vote-btn no" onclick="vote('no')">No</button>
      <button class="vote-btn not-sure" onclick="vote('not_sure')">Not Sure</button>
    </div>

    <div class="results" id="results">
      <div class="result-row">
        <div class="result-label"><span>Yes</span><span id="pct-yes">0%</span></div>
        <div class="result-bar-bg"><div class="result-bar yes" id="bar-yes"></div></div>
      </div>
      <div class="result-row">
        <div class="result-label"><span>No</span><span id="pct-no">0%</span></div>
        <div class="result-bar-bg"><div class="result-bar no" id="bar-no"></div></div>
      </div>
      <div class="result-row">
        <div class="result-label"><span>Not Sure</span><span id="pct-not-sure">0%</span></div>
        <div class="result-bar-bg"><div class="result-bar not-sure" id="bar-not-sure"></div></div>
      </div>
      <div class="total-votes"><span id="total">0</span> total votes</div>
    </div>
  </div>

  <script>
    let hasVoted = false;

    function vote(choice) {
      fetch('/vote', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ choice })
      })
      .then(r => r.json())
      .then(data => {
        hasVoted = true;
        document.getElementById('buttons').style.display = 'none';
        showResults(data);
        startAutoRefresh();
      });
    }

    function showResults(data) {
      const el = document.getElementById('results');
      el.classList.add('show');

      document.getElementById('pct-yes').textContent = data.yes + '%';
      document.getElementById('pct-no').textContent = data.no + '%';
      document.getElementById('pct-not-sure').textContent = data.not_sure + '%';
      document.getElementById('total').textContent = data.total;

      setTimeout(() => {
        document.getElementById('bar-yes').style.width = data.yes + '%';
        document.getElementById('bar-no').style.width = data.no + '%';
        document.getElementById('bar-not-sure').style.width = data.not_sure + '%';
      }, 50);
    }

    function startAutoRefresh() {
      setInterval(() => {
        fetch('/results')
          .then(r => r.json())
          .then(data => showResults(data));
      }, 5000);
    }
  </script>
</body>
</html>
