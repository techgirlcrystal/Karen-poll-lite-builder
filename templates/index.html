<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NIL Deals Poll</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #e0e0e0;
      padding: 20px;
    }

    .card-container {
      max-width: 520px;
      width: 100%;
      position: relative;
    }

    .card {
      background: linear-gradient(145deg, #141420, #1a1a2e);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 20px;
      padding: 44px 36px;
      box-shadow:
        0 20px 60px rgba(0, 0, 0, 0.6),
        0 0 80px rgba(100, 60, 255, 0.05);
      text-align: center;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    .card.hidden {
      opacity: 0;
      transform: scale(0.95);
      position: absolute;
      top: 0; left: 0; right: 0;
      pointer-events: none;
    }

    .card.visible {
      opacity: 1;
      transform: scale(1);
    }

    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 20px;
      margin-bottom: 24px;
    }

    .badge-poll { background: rgba(255, 200, 60, 0.12); color: #ffc83c; }
    .badge-results { background: rgba(76, 175, 80, 0.12); color: #66bb6a; }
    .badge-comments { background: rgba(100, 140, 255, 0.12); color: #648cff; }

    h1 {
      font-size: 24px;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 36px;
      color: #ffffff;
    }

    h2 {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 28px;
      color: #ffffff;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .vote-btn {
      padding: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.03);
      color: #e0e0e0;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .vote-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.15);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
    }

    .vote-btn.yes:hover { border-color: #4caf50; color: #4caf50; }
    .vote-btn.no:hover { border-color: #ef5350; color: #ef5350; }
    .vote-btn.not-sure:hover { border-color: #ffc83c; color: #ffc83c; }

    .result-rows {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .result-row { text-align: left; }

    .result-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
    }

    .result-bar-bg {
      height: 10px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 6px;
      overflow: hidden;
    }

    .result-bar {
      height: 100%;
      border-radius: 6px;
      width: 0%;
      transition: width 0.8s ease;
    }

    .result-bar.yes { background: linear-gradient(90deg, #4caf50, #66bb6a); }
    .result-bar.no { background: linear-gradient(90deg, #ef5350, #e57373); }
    .result-bar.not-sure { background: linear-gradient(90deg, #ffc83c, #ffd54f); }

    .total-votes {
      font-size: 13px;
      color: #888;
      margin-top: 24px;
      margin-bottom: 24px;
    }

    .share-why-btn {
      padding: 14px 28px;
      border: 1px solid rgba(100, 140, 255, 0.3);
      border-radius: 12px;
      background: rgba(100, 140, 255, 0.08);
      color: #648cff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .share-why-btn:hover {
      background: rgba(100, 140, 255, 0.15);
      border-color: rgba(100, 140, 255, 0.5);
      transform: translateY(-2px);
    }

    .thank-you {
      font-size: 14px;
      color: #aaa;
      margin-bottom: 28px;
    }

    .form-group {
      margin-bottom: 16px;
      text-align: left;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #aaa;
      margin-bottom: 6px;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.03);
      color: #e0e0e0;
      font-size: 15px;
      font-family: inherit;
      transition: border-color 0.2s ease;
      outline: none;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      border-color: rgba(100, 140, 255, 0.4);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }

    .form-row {
      display: flex;
      gap: 12px;
    }

    .form-row .form-group { flex: 1; }

    .submit-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #648cff, #5a5fff);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      margin-top: 8px;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(100, 140, 255, 0.3);
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .feed-section {
      margin-top: 28px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      padding-top: 24px;
    }

    .feed-title {
      font-size: 14px;
      font-weight: 700;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 16px;
    }

    .feed {
      max-height: 360px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.1) transparent;
    }

    .feed::-webkit-scrollbar { width: 4px; }
    .feed::-webkit-scrollbar-track { background: transparent; }
    .feed::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

    .comment-item {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 14px 16px;
      text-align: left;
      transition: border-color 0.2s ease;
    }

    .comment-item:hover {
      border-color: rgba(255, 255, 255, 0.1);
    }

    .comment-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .comment-author {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
    }

    .comment-vote-tag {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .tag-yes { background: rgba(76, 175, 80, 0.15); color: #66bb6a; }
    .tag-no { background: rgba(239, 83, 80, 0.15); color: #ef5350; }
    .tag-not-sure { background: rgba(255, 200, 60, 0.15); color: #ffc83c; }

    .comment-text {
      font-size: 14px;
      line-height: 1.5;
      color: #ccc;
      margin-bottom: 6px;
    }

    .comment-meta {
      font-size: 12px;
      color: #666;
    }

    .empty-feed {
      color: #555;
      font-size: 14px;
      padding: 20px 0;
    }
  </style>
</head>
<body>
  <div class="card-container">

    <div class="card visible" id="vote-card">
      <img src="https://storage.googleapis.com/msgsndr/halVDiOUo2ZD9JFP03ez/media/698788ab2dd9857900c00e26.png" alt="Poll Banner" style="width:100%;border-radius:12px;margin-bottom:24px;">
      <div class="badge badge-poll">Live Poll</div>
      <h1>Should high school athletes be allowed to sign NIL deals?</h1>
      <div class="buttons">
        <button class="vote-btn yes" onclick="castVote('yes')">Yes</button>
        <button class="vote-btn no" onclick="castVote('no')">No</button>
        <button class="vote-btn not-sure" onclick="castVote('not_sure')">Not Sure</button>
      </div>
    </div>

    <div class="card hidden" id="results-card">
      <div class="badge badge-results">Results</div>
      <h2>Current Results</h2>
      <p class="thank-you">Thanks for voting!</p>
      <div class="result-rows">
        <div class="result-row">
          <div class="result-label"><span>Yes</span><span id="pct-yes">0%</span></div>
          <div class="result-bar-bg"><div class="result-bar yes" id="bar-yes"></div></div>
        </div>
        <div class="result-row">
          <div class="result-label"><span>No</span><span id="pct-no">0%</span></div>
          <div class="result-bar-bg"><div class="result-bar no" id="bar-no"></div></div>
        </div>
        <div class="result-row">
          <div class="result-label"><span>Not Sure</span><span id="pct-not-sure">0%</span></div>
          <div class="result-bar-bg"><div class="result-bar not-sure" id="bar-not-sure"></div></div>
        </div>
      </div>
      <div class="total-votes"><span id="total">0</span> total votes</div>
      <button class="share-why-btn" onclick="showCommentCard()">Share Your Why</button>

      <div class="feed-section">
        <div class="feed-title">Live Comments</div>
        <div class="feed" id="results-feed">
          <div class="empty-feed">No comments yet.</div>
        </div>
      </div>
    </div>

    <div class="card hidden" id="comment-card">
      <div class="badge badge-comments">Share Your Why</div>
      <h2>Why did you vote <span id="user-vote-label" style="color:#648cff"></span>?</h2>

      <div class="form-row">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" id="fname" placeholder="John" maxlength="50" oninput="this.style.borderColor=''">
        </div>
        <div class="form-group">
          <label>State</label>
          <input type="text" id="state" placeholder="Texas" maxlength="50" oninput="this.style.borderColor=''">
        </div>
      </div>
      <div class="form-group">
        <label>Your Comment</label>
        <textarea id="comment" placeholder="Tell us why..." maxlength="500" oninput="this.style.borderColor=''"></textarea>
      </div>
      <button class="submit-btn" id="submit-btn" onclick="submitComment()">Submit</button>

      <div class="feed-section">
        <div class="feed-title">Live Comments</div>
        <div class="feed" id="comment-feed">
          <div class="empty-feed">No comments yet. Be the first!</div>
        </div>
      </div>
    </div>

  </div>

  <script>
    let userVote = '';
    let refreshTimer = null;
    let commentTimer = null;

    function castVote(choice) {
      userVote = choice;
      fetch('/vote', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ choice })
      })
      .then(r => r.json())
      .then(data => {
        switchCard('vote-card', 'results-card');
        updateBars(data);
        startSmartRefresh();
      });
    }

    function showCommentCard() {
      const labels = { yes: 'Yes', no: 'No', not_sure: 'Not Sure' };
      document.getElementById('user-vote-label').textContent = labels[userVote];
      switchCard('results-card', 'comment-card');
      loadComments();
      startCommentRefresh();
    }

    function switchCard(hideId, showId) {
      const hideEl = document.getElementById(hideId);
      const showEl = document.getElementById(showId);
      hideEl.classList.remove('visible');
      hideEl.classList.add('hidden');
      setTimeout(() => {
        showEl.classList.remove('hidden');
        showEl.classList.add('visible');
      }, 400);
    }

    function updateBars(data) {
      document.getElementById('pct-yes').textContent = data.yes + '%';
      document.getElementById('pct-no').textContent = data.no + '%';
      document.getElementById('pct-not-sure').textContent = data.not_sure + '%';
      document.getElementById('total').textContent = data.total;
      setTimeout(() => {
        document.getElementById('bar-yes').style.width = data.yes + '%';
        document.getElementById('bar-no').style.width = data.no + '%';
        document.getElementById('bar-not-sure').style.width = data.not_sure + '%';
      }, 50);
    }

    function startSmartRefresh() {
      if (refreshTimer) return;
      loadComments();
      refreshTimer = setInterval(() => {
        if (document.hidden) return;
        fetch('/results').then(r => r.json()).then(data => updateBars(data));
        loadComments();
      }, 5000);
      document.addEventListener('visibilitychange', () => {
        if (!document.hidden) {
          fetch('/results').then(r => r.json()).then(data => updateBars(data));
          loadComments();
        }
      });
    }

    function submitComment() {
      const fname = document.getElementById('fname').value.trim();
      const state = document.getElementById('state').value.trim();
      const comment = document.getElementById('comment').value.trim();
      const btn = document.getElementById('submit-btn');

      if (!fname || !state || !comment) {
        if (!fname) document.getElementById('fname').style.borderColor = '#ef5350';
        if (!state) document.getElementById('state').style.borderColor = '#ef5350';
        if (!comment) document.getElementById('comment').style.borderColor = '#ef5350';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Sending...';

      fetch('/comment', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ first_name: fname, state, comment, vote: userVote })
      })
      .then(r => {
        if (!r.ok) throw new Error('Server error');
        return r.json();
      })
      .then(() => {
        document.getElementById('fname').value = '';
        document.getElementById('state').value = '';
        document.getElementById('comment').value = '';
        btn.disabled = false;
        btn.textContent = 'Submitted!';
        setTimeout(() => { btn.textContent = 'Submit'; }, 2000);
        loadComments();
      })
      .catch(() => {
        btn.disabled = false;
        btn.textContent = 'Try Again';
        setTimeout(() => { btn.textContent = 'Submit'; }, 2000);
      });
    }

    function loadComments() {
      fetch('/comments')
        .then(r => {
          if (!r.ok) throw new Error('Server error');
          return r.json();
        })
        .then(comments => {
          const html = buildCommentsHTML(comments);
          const resultsFeed = document.getElementById('results-feed');
          const commentFeed = document.getElementById('comment-feed');
          if (resultsFeed) resultsFeed.innerHTML = html;
          if (commentFeed) commentFeed.innerHTML = html;
        })
        .catch(() => {});
    }

    function buildCommentsHTML(comments) {
      if (comments.length === 0) {
        return '<div class="empty-feed">No comments yet. Be the first!</div>';
      }
      return comments.map(c => {
        const tagClass = c.vote === 'Yes' ? 'tag-yes' : (c.vote === 'No' ? 'tag-no' : 'tag-not-sure');
        return `
          <div class="comment-item">
            <div class="comment-header">
              <span class="comment-author">${esc(c.first_name)}</span>
              <span class="comment-vote-tag ${tagClass}">${esc(c.vote)}</span>
            </div>
            <div class="comment-text">${esc(c.comment)}</div>
            <div class="comment-meta">${esc(c.state)} &middot; ${esc(c.time)}</div>
          </div>`;
      }).join('');
    }

    function startCommentRefresh() {
      if (commentTimer) return;
      commentTimer = setInterval(() => {
        if (document.hidden) return;
        loadComments();
      }, 5000);
    }

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }
  </script>
</body>
</html>
