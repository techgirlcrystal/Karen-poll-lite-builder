<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NIL Deals Poll</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #e0e0e0;
      perspective: 800px;
    }

    .card-container {
      max-width: 480px;
      width: 90%;
      position: relative;
    }

    .card {
      background: linear-gradient(145deg, #141420, #1a1a2e);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 20px;
      padding: 48px 40px;
      box-shadow:
        0 20px 60px rgba(0, 0, 0, 0.6),
        0 0 80px rgba(100, 60, 255, 0.05);
      text-align: center;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    .card.hidden {
      opacity: 0;
      transform: scale(0.95);
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      pointer-events: none;
    }

    .card.visible {
      opacity: 1;
      transform: scale(1);
    }

    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 20px;
      margin-bottom: 24px;
    }

    .badge-poll {
      background: rgba(255, 200, 60, 0.12);
      color: #ffc83c;
    }

    .badge-results {
      background: rgba(76, 175, 80, 0.12);
      color: #66bb6a;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 36px;
      color: #ffffff;
    }

    h2 {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 32px;
      color: #ffffff;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .vote-btn {
      padding: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.03);
      color: #e0e0e0;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .vote-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.15);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
    }

    .vote-btn.yes:hover { border-color: #4caf50; color: #4caf50; }
    .vote-btn.no:hover { border-color: #ef5350; color: #ef5350; }
    .vote-btn.not-sure:hover { border-color: #ffc83c; color: #ffc83c; }

    .result-rows {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .result-row {
      text-align: left;
    }

    .result-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
    }

    .result-bar-bg {
      height: 10px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 6px;
      overflow: hidden;
    }

    .result-bar {
      height: 100%;
      border-radius: 6px;
      width: 0%;
      transition: width 0.8s ease;
    }

    .result-bar.yes { background: linear-gradient(90deg, #4caf50, #66bb6a); }
    .result-bar.no { background: linear-gradient(90deg, #ef5350, #e57373); }
    .result-bar.not-sure { background: linear-gradient(90deg, #ffc83c, #ffd54f); }

    .total-votes {
      font-size: 13px;
      color: #888;
      margin-top: 24px;
    }

    .thank-you {
      font-size: 14px;
      color: #aaa;
      margin-bottom: 28px;
    }
  </style>
</head>
<body>
  <div class="card-container">

    <div class="card visible" id="vote-card">
      <div class="badge badge-poll">Live Poll</div>
      <h1>Should high school athletes be allowed to sign NIL deals?</h1>
      <div class="buttons">
        <button class="vote-btn yes" onclick="vote('yes')">Yes</button>
        <button class="vote-btn no" onclick="vote('no')">No</button>
        <button class="vote-btn not-sure" onclick="vote('not_sure')">Not Sure</button>
      </div>
    </div>

    <div class="card hidden" id="results-card">
      <div class="badge badge-results">Results</div>
      <h2>Current Results</h2>
      <p class="thank-you">Thanks for voting!</p>
      <div class="result-rows">
        <div class="result-row">
          <div class="result-label"><span>Yes</span><span id="pct-yes">0%</span></div>
          <div class="result-bar-bg"><div class="result-bar yes" id="bar-yes"></div></div>
        </div>
        <div class="result-row">
          <div class="result-label"><span>No</span><span id="pct-no">0%</span></div>
          <div class="result-bar-bg"><div class="result-bar no" id="bar-no"></div></div>
        </div>
        <div class="result-row">
          <div class="result-label"><span>Not Sure</span><span id="pct-not-sure">0%</span></div>
          <div class="result-bar-bg"><div class="result-bar not-sure" id="bar-not-sure"></div></div>
        </div>
      </div>
      <div class="total-votes"><span id="total">0</span> total votes</div>
    </div>

  </div>

  <script>
    let refreshTimer = null;

    function vote(choice) {
      fetch('/vote', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ choice })
      })
      .then(r => r.json())
      .then(data => {
        document.getElementById('vote-card').classList.remove('visible');
        document.getElementById('vote-card').classList.add('hidden');

        setTimeout(() => {
          const resultsCard = document.getElementById('results-card');
          resultsCard.classList.remove('hidden');
          resultsCard.classList.add('visible');
          updateBars(data);
          startSmartRefresh();
        }, 400);
      });
    }

    function updateBars(data) {
      document.getElementById('pct-yes').textContent = data.yes + '%';
      document.getElementById('pct-no').textContent = data.no + '%';
      document.getElementById('pct-not-sure').textContent = data.not_sure + '%';
      document.getElementById('total').textContent = data.total;

      setTimeout(() => {
        document.getElementById('bar-yes').style.width = data.yes + '%';
        document.getElementById('bar-no').style.width = data.no + '%';
        document.getElementById('bar-not-sure').style.width = data.not_sure + '%';
      }, 50);
    }

    function startSmartRefresh() {
      if (refreshTimer) return;
      refreshTimer = setInterval(() => {
        if (document.hidden) return;
        fetch('/results')
          .then(r => r.json())
          .then(data => updateBars(data));
      }, 5000);

      document.addEventListener('visibilitychange', () => {
        if (!document.hidden) {
          fetch('/results')
            .then(r => r.json())
            .then(data => updateBars(data));
        }
      });
    }
  </script>
</body>
</html>
